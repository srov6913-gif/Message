<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Message</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 80%;
            padding: 20px;
            border-radius: 10px;
            background-color: #1e1e1e;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        button {
            background-color: #ff4081;
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #f50057;
        }
        .message {
            font-size: 1.2em;
            margin: 20px 0;
        }
        .heart {
            font-size: 2em;
            color: #ff4081;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="question1">
            <h2>Do you love your Shah?</h2>
            <button onclick="handleYes1()">Yes</button>
            <button onclick="handleNo1()">No</button>
        </div>
        <div id="response1" class="hidden"></div>
        <div id="question2" class="hidden">
            <h2>Do you want your loving person to stay happy?</h2>
            <button onclick="handleYes2()">Yes</button>
            <button onclick="handleNo2()">No</button>
        </div>
        <div id="response2" class="hidden"></div>
    </div>

    <script>
        function handleYes1() {
            document.getElementById('question1').classList.add('hidden');
            const response1 = document.getElementById('response1');
            response1.innerHTML = '<div class="message">Wonderful! <span class="heart">❤️</span></div>';
            response1.classList.remove('hidden');
            document.getElementById('question2').classList.remove('hidden');
        }

        function handleNo1() {
            document.getElementById('question1').classList.add('hidden');
            const response1 = document.getElementById('response1');
            response1.innerHTML = '<div class="message">You hate me? Superb, I feel the same. Please don\'t text me.</div>';
            response1.classList.remove('hidden');
        }

        function handleYes2() {
            document.getElementById('question2').classList.add('hidden');
            const response2 = document.getElementById('response2');
            response2.innerHTML = '<div class="message">Nice! I\'m glad Aysha,you want to see me happy. I\'d appreciate it if you don\'t contact me anymore.</div>';
            response2.classList.remove('hidden');
        }

        function handleNo2() {
            document.getElementById('question2').classList.add('hidden');
            const response2 = document.getElementById('response2');
            response2.innerHTML = '<div class="message">Oh really?! Then go your own way—don\'t text me, lol!</div>';
            response2.classList.remove('hidden');
        }
    </script>
</body>
</html>
